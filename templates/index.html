<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro-Savings Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto p-6">
       <header class="text-center mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-bold text-green-600 flex items-center gap-3">
                    <i class="fas fa-piggy-bank"></i> Micro-Savings Assistant
                </h1>
                <p class="text-gray-600 mt-2">Smart Receipt Analyzer & Shopping Optimizer</p>
            </div>
            {% if current_user.is_authenticated %}
            <div class="flex items-center gap-4">
                <span class="text-green-600">Hi, {{ current_user.username }}!</span>
                <a href="{{ url_for('logout') }}" class="text-red-500 hover:text-red-600">Logout</a>
            </div>
            {% else %}
            <div class="flex gap-3">
                <a href="{{ url_for('login') }}" class="px-6 py-2 border border-green-600 text-green-600 rounded-2xl hover:bg-green-50">Login</a>
                <a href="{{ url_for('register') }}" class="px-6 py-2 bg-green-600 text-white rounded-2xl hover:bg-green-700">Register</a>
            </div>
            {% endif %}
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Upload Section -->
            <div class="bg-white rounded-2xl shadow-lg p-8">
                <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2">
                    <i class="fas fa-upload"></i> Upload Receipt
                </h2>
                
                 <form id="uploadForm" enctype="multipart/form-data" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Paste Receipt Text</label>
                        <textarea id="receiptText" rows="6" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent"
                            placeholder="Amul Milk 1L    2.50&#10;Whole Wheat Bread 400g    1.20"></textarea>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Or Upload Image / TXT</label>
                        <input type="file" id="fileInput" name="file" accept="image/*,.txt" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl">
                    </div>
                    
                    <div class="flex gap-4">
                        <button type="submit" 
                            class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-4 px-8 rounded-2xl transition-all flex items-center justify-center gap-2">
                            <i class="fas fa-magic"></i> Analyze Receipt
                        </button>
                    </div>
                </form>
                
                <div class="mt-6 pt-6 border-t text-xs text-gray-500">
                    Supports: Text paste, .txt files, and images (JPG/PNG) with OCR
                </div>
            </div>

            <!-- Results Dashboard -->
            <div id="results" class="hidden bg-white rounded-2xl shadow-lg p-8">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 class="text-2xl font-semibold">Analysis Results</h2>
                        <div id="summary" class="mt-4 grid grid-cols-2 gap-4"></div>
                    </div>
                    <button onclick="resetUI()" 
                        class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-redo"></i>
                    </button>
                </div>
                
                <div id="itemRecommendations" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <script>
         async function analyzeReceipt() {
            const text = document.getElementById('receiptText').value.trim();
            const fileInput = document.getElementById('fileInput');
            const formData = new FormData();

            if (text) {
                formData.append('receipt_text', text);
            }
            if (fileInput.files.length > 0) {
                formData.append('file', fileInput.files[0]);
            }

            if (!text && !fileInput.files.length) {
                alert("Please paste text or upload a file");
                return;
            }

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.error) {
                    alert(data.error);
                    return;
                }

                showDashboard(data);
            } catch (e) {
                alert("Please log in first to use the service.");
            }
        }

        function showDashboard(data) {
            document.getElementById('results').classList.remove('hidden');
            
            // Summary
            const summaryHTML = `
                <div class="bg-green-50 p-4 rounded-2xl">
                    <div class="text-sm text-green-600">Total Spent</div>
                    <div class="text-3xl font-bold">$${data.total_spent}</div>
                </div>
                <div class="bg-emerald-50 p-4 rounded-2xl">
                    <div class="text-sm text-emerald-600">Potential Savings</div>
                    <div class="text-3xl font-bold text-emerald-600">$${data.total_savings}</div>
                    <div class="text-sm">(${data.savings_pct}%)</div>
                </div>
            `;
            document.getElementById('summary').innerHTML = summaryHTML;

            // Recommendations
            let recHTML = '';
            for (const [itemName, recs] of Object.entries(data.recommendations)) {
                if (recs.length === 0) continue;
                
                recHTML += `
                    <div class="border border-gray-100 rounded-2xl p-6">
                        <div class="font-medium text-lg mb-4">📦 ${itemName}</div>
                        <div class="space-y-4">
                `;
                
                recs.forEach(rec => {
                    recHTML += `
                        <div class="flex justify-between items-start bg-gray-50 p-4 rounded-xl">
                            <div>
                                <div class="font-semibold">${rec.alternative}</div>
                                <div class="text-sm text-gray-600">${rec.explanation}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-emerald-600 font-bold">-${rec.savings_pct}%</div>
                            </div>
                        </div>
                    `;
                });
                
                recHTML += `</div></div>`;
            }
            
            document.getElementById('itemRecommendations').innerHTML = recHTML;
        }

        function resetUI() {
            document.getElementById('results').classList.add('hidden');
            document.getElementById('receiptText').value = '';
        }

        // Form submit
        document.getElementById('uploadForm').addEventListener('submit', (e) => {
            e.preventDefault();
            analyzeReceipt();
        });
    </script>
</body>
</html>
